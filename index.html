<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Web Portal 🚀</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #faf8ef;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #776e65;
    }
    .portal-container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 450px;
      width: 100%;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 2.2rem;
    }
    p {
      color: #9e948a;
      margin-bottom: 30px;
    }
    .links-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    /* สไตล์ของปุ่มลิงก์ */
    .project-link {
      background-color: #8f7a66;
      color: white;
      text-decoration: none;
      padding: 15px 20px;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      transition: all 0.2s ease;
      display: block;
    }
    .project-link:hover {
      background-color: #7f6a56;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

<div class="portal-container">
  <h1>My Workspace 🚀</h1>
  <p>ยินดีต้อนรับเข้าสู่หน้าแรกของฉัน เลือกเปิดโปรเจกต์ด้านล่างนี้ได้เลยครับ:</p>

  <div class="links-list">
    <a href="mathmerge.html" class="project-link">🎯 เล่นเกม Math Merge</a>
    
    </div>
</div>

</body>
</html>
